services:
  backend:
    build: ./backend
    ports: 
      - "8080:8080"
    container_name: springboot-container
    networks: 
      - spring-network
    depends_on:
      - db
    

  db:
    image: mysql:8.0
    container_name: mysql-db
    networks: 
      - spring-network
    ports: 
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chriss_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: password123

networks:
  spring-network:
    driver: bridge
