apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: account-route
  namespace: banking
spec:
  parentRefs:
    - name: banking-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/accounts
      backendRefs:
        - name: account-service
          port: 3002